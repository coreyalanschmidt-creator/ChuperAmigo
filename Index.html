<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Feast</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Pro:ital,wght@0,300;1,300&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000a1a; overflow: hidden; font-family: 'Crimson Pro', serif; color: #a8e6ff; cursor: none; }
  #start-screen, #gameover-screen, #win-screen, #pause-screen { cursor: default; }
  #start-screen *, #gameover-screen *, #win-screen *, #pause-screen * { cursor: default; }
  .start-btn { cursor: pointer !important; }
  #gameCanvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    pointer-events: none; z-index: 10;
    background: rgba(0,8,20,0.55); backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(0,170,255,0.12);
  }
  /* Row 1: Score | Tier progress bar + labels | Time & Best */
  #ui-row1 {
    display: flex; align-items: center;
    padding: 2px 14px;
  }
  #tier-center { display: flex; align-items: center; gap: 8px; }
  #ui-row1 > .stat { flex: 1; text-align: right; }
  .stat { text-align: center; min-width: 48px; }
  #left-stats { flex: 1; display: flex; gap: 18px; align-items: center; }
  .stat-label { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px; color: #4a9ebb; text-transform: uppercase; margin-bottom: 0px; }
  .stat-value { font-size: 14px; font-weight: 300; color: #d0f0ff; line-height: 1; text-shadow: 0 0 8px #0af; }
  .tier-box {
    display: flex; align-items: center; gap: 4px; border-radius: 4px; padding: 1px 8px;
  }
  .tier-box-label { display: none; }
  .tier-box-emoji { font-size: 16px; line-height: 1; }
  .tier-box-name  { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; margin-top: 0; }
  #current-box {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 14px rgba(255,238,0,0.15);
  }
  #evolve-arrow {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  #evolve-arrow span:first-child { display: none; }
  #evolve-arrow span:last-child  { font-size: 14px; color: #00ff88; text-shadow: 0 0 6px #0f8; animation: arrowPulse 1s infinite; }
  #evolution-msg {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family: 'Cinzel', serif; font-size: 32px; color: #fff;
    text-shadow: 0 0 40px #0ff, 0 0 80px #0ff;
    pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 20; white-space: nowrap;
  }
  #overlay { position: fixed; inset: 0; background: radial-gradient(ellipse at center, #000d2200 30%, #000a1a 100%); z-index: 5; pointer-events: none; }
  #start-screen {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000a1a; z-index: 30; overflow: hidden;
  }
  .start-btn {
    font-family: 'Cinzel', serif; font-size: 16px; letter-spacing: 4px;
    color: #000d22; background: linear-gradient(135deg, #7de8ff, #0af);
    border: none; padding: 16px 48px; cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); transition: all 0.2s;
  }
  .start-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px #0af; }
  .creatures-preview { display: flex; gap: 16px; margin-bottom: 40px; font-size: 28px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
  .instructions { margin-top: 24px; font-size: 14px; color: #3a7a99; letter-spacing: 1px; text-align: center; line-height: 2; }

  /* Portrait panel responsive: on mobile portrait, use full-cover mode */
  @media (max-aspect-ratio: 1/1) {
    #start-bg-img {
      width: 100% !important;
      height: auto !important;
      top: 50% !important;
      left: 0 !important;
      transform: translateY(-50%) !important;
      object-fit: contain !important;
      object-position: top center !important;
    }
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="overlay"></div>
<div id="ui">
  <!-- Row 1: Score · Progress · Time/Best -->
  <div id="ui-row1">
    <div id="left-stats">
      <div class="stat">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timer-display" style="color:#7de8ff; text-shadow:0 0 14px #0af;">0:00</div>
      </div>
    </div>
    <div id="tier-center">
      <div class="tier-box" id="current-box">
        <div class="tier-box-emoji" id="tier-display"></div>
        <div class="tier-box-name" id="tier-current-name">Bacterium</div>
      </div>
      <div id="evolve-arrow">
        <span>eat to evolve</span>
        <span>→</span>
      </div>
      <div class="tier-box">
        <div class="tier-box-emoji" id="tier-next-emoji"></div>
        <div class="tier-box-name" id="tier-next-name">Copepod</div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="best">0</div>
    </div>
  </div>

</div>
<div id="evolution-msg"></div>

<div id="win-screen" style="display:none; position:fixed; inset:0; z-index:50; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,5,18,0.90); backdrop-filter:blur(10px);">
  <div style="font-size:96px; margin-bottom:4px; animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards;">💥</div>
  <div style="font-family:'Cinzel',serif; font-size:52px; color:#ffdd00; letter-spacing:6px; text-shadow:0 0 60px #ff8800, 0 0 120px #ff4400; margin-bottom:4px; animation: popIn 0.6s 0.1s both;">💥 TOO FAT 💥</div>
  <div style="font-family:'Crimson Pro',serif; font-size:20px; color:#ffaa44; font-style:italic; margin-bottom:28px; animation: popIn 0.5s 0.2s both;">The fisherman ate everything in the ocean. Absolutely legendary. 🎣💥</div>
  <div style="display:flex;gap:40px;margin-bottom:12px;align-items:flex-end;">
    <div style="text-align:center;">
      <div style="font-family:'Cinzel',serif; font-size:10px; color:#4a9ebb; letter-spacing:3px; text-transform:uppercase; margin-bottom:4px;">Raw Score</div>
      <div id="win-raw-score" style="font-family:'Cinzel',serif; font-size:32px; color:#aaddff; text-shadow:0 0 20px #0af;">0</div>
    </div>
    <div style="text-align:center;">
      <div style="font-family:'Cinzel',serif; font-size:10px; color:#4a9ebb; letter-spacing:3px; text-transform:uppercase; margin-bottom:4px;">Time</div>
      <div id="win-time" style="font-family:'Cinzel',serif; font-size:32px; color:#7de8ff; text-shadow:0 0 20px #0af;">0:00</div>
    </div>
  </div>
  <div style="font-family:'Cinzel',serif; font-size:11px; color:#4a9ebb; letter-spacing:4px; margin-bottom:6px; text-transform:uppercase;">Final Score</div>
  <div id="win-score" style="font-family:'Cinzel',serif; font-size:72px; font-weight:700; color:#fff; text-shadow:0 0 40px #ff0, 0 0 80px #f80; margin-bottom:8px; animation: scoreReveal 0.8s 0.4s both;">0</div>
  
  <div id="win-best" style="font-family:'Crimson Pro',serif; font-size:16px; color:#ffaa44; font-style:italic; margin-bottom:40px;"></div>
  <button class="start-btn" onclick="restartGame()" style="background:linear-gradient(135deg,#ffdd00,#ff8800);">DIVE AGAIN</button>
</div>


<div id="gameover-screen" style="display:none; position:fixed; inset:0; z-index:40; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,5,18,0.82); backdrop-filter:blur(8px);">
  <div id="go-creature" style="font-size:44px; margin-bottom:4px; animation: popIn 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards;">🦠</div>
  <div style="font-family:'Cinzel',serif; font-size:13px; color:#4a9ebb; letter-spacing:5px; margin-bottom:4px;">YOU REACHED</div>
  <div id="go-tier-name" style="font-family:'Cinzel',serif; font-size:28px; color:#7de8ff; letter-spacing:3px; text-shadow:0 0 30px #0af; margin-bottom:10px; animation: popIn 0.6s 0.15s cubic-bezier(0.175,0.885,0.32,1.275) both;">Krill</div>
  <div style="display:flex;gap:24px;margin-bottom:6px;align-items:flex-end;">
    <div style="text-align:center;">
      <div style="font-family:'Cinzel',serif; font-size:10px; color:#3a6a88; letter-spacing:3px; text-transform:uppercase; margin-bottom:4px;">Raw Score</div>
      <div id="go-raw-score" style="font-family:'Cinzel',serif; font-size:28px; color:#7ab8cc;">0</div>
    </div>
    <div style="text-align:center;">
      <div style="font-family:'Cinzel',serif; font-size:10px; color:#3a6a88; letter-spacing:3px; text-transform:uppercase; margin-bottom:4px;">Survived</div>
      <div id="go-time" style="font-family:'Cinzel',serif; font-size:28px; color:#7de8ff;">0:00</div>
    </div>
  </div>
  <div style="font-family:'Cinzel',serif; font-size:11px; color:#3a6a88; letter-spacing:4px; margin-bottom:6px; text-transform:uppercase;">Final Score</div>
  <div id="go-score" style="font-family:'Cinzel',serif; font-size:52px; font-weight:700; color:#fff; text-shadow:0 0 30px #0ff, 0 0 60px #0af; margin-bottom:4px; animation: scoreReveal 0.8s 0.3s cubic-bezier(0.175,0.885,0.32,1.275) both;">0</div>
  <div id="go-best" style="font-family:'Crimson Pro',serif; font-size:14px; color:#4a9ebb; font-style:italic; margin-bottom:14px;"></div>
  <button class="start-btn" onclick="restartGame()">DIVE AGAIN</button>
</div>

<div id="pause-screen" style="display:none; position:fixed; inset:0; z-index:45; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,5,18,0.78); backdrop-filter:blur(12px); pointer-events:all;">
  <div style="font-size:64px; margin-bottom:8px;">⏸</div>
  <div style="font-family:'Cinzel',serif; font-size:40px; color:#7de8ff; letter-spacing:8px; text-shadow:0 0 40px #0af; margin-bottom:12px;">PAUSED</div>
  <div style="font-family:'Crimson Pro',serif; font-size:16px; color:#4a9ebb; font-style:italic; margin-bottom:28px;">Press Space / Esc to resume</div>
  <button id="music-btn" onclick="toggleMusic()" style="background:none;border:1px solid #1a5a77;color:#4a9ebb;font-family:'Cinzel',serif;font-size:14px;letter-spacing:2px;padding:10px 32px;cursor:pointer;border-radius:6px;margin-bottom:16px;">🎵 Music: On</button>
  <button class="start-btn" onclick="togglePause()" style="background:linear-gradient(135deg,#0af,#0066aa);">RESUME</button>
</div>

<style>
@keyframes popIn { 0%{transform:scale(0.3);opacity:0} 70%{transform:scale(1.15);opacity:1} 100%{transform:scale(1);opacity:1} }
@keyframes scoreReveal { 0%{transform:scale(0.2);opacity:0;filter:blur(20px)} 60%{transform:scale(1.1);opacity:1;filter:blur(0)} 100%{transform:scale(1);opacity:1;filter:blur(0)} }
@keyframes celebrate { 0%{transform:scale(0.5) rotate(-10deg);opacity:0} 60%{transform:scale(1.15) rotate(3deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:1} }
@keyframes arrowPulse { 0%,100%{transform:translateX(0);opacity:0.6} 50%{transform:translateX(5px);opacity:1} }
#evolution-msg { animation: none; }
#evolution-msg.celebrate { animation: celebrate 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }

  /* Portrait panel responsive: on mobile portrait, use full-cover mode */
  @media (max-aspect-ratio: 1/1) {
    #start-bg-img {
      width: 100% !important;
      height: auto !important;
      top: 50% !important;
      left: 0 !important;
      transform: translateY(-50%) !important;
      object-fit: contain !important;
      object-position: top center !important;
    }
  }
</style>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  // Rescatter bubbles across new canvas dimensions
  bubbles.forEach(b => {
    b.x = Math.random() * canvas.width;
    b.y = Math.random() * canvas.height;
  });
});

// ─── AUDIO ──────────────────────────────────────────────────────────────────
let audioCtx = null;
let musicMuted = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0, audioCtx.currentTime);
  master.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 4);
  master.connect(audioCtx.destination);

  // Reverb impulse
  const convolver = audioCtx.createConvolver();
  const bufLen = audioCtx.sampleRate * 4;
  const impulse = audioCtx.createBuffer(2, bufLen, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = impulse.getChannelData(ch);
    for (let i = 0; i < bufLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/bufLen, 2.5);
  }
  convolver.buffer = impulse;
  const reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 0.4;
  convolver.connect(reverbGain);
  reverbGain.connect(master);

  // Drone pads
  [[55,0.10],[82.4,0.07],[110,0.06],[138.6,0.04],[164.8,0.04]].forEach(([freq, gain]) => {
    const osc = audioCtx.createOscillator();
    const lfo = audioCtx.createOscillator();
    const lfoG = audioCtx.createGain();
    const g = audioCtx.createGain();
    lfo.frequency.value = 0.05 + Math.random()*0.06;
    lfoG.gain.value = freq * 0.007;
    lfo.connect(lfoG); lfoG.connect(osc.frequency);
    osc.type = 'sine'; osc.frequency.value = freq;
    g.gain.value = gain;
    osc.connect(g); g.connect(master); g.connect(convolver);
    lfo.start(); osc.start();
  });

  // Pentatonic bubble notes
  const penta = [220,247,277,330,370,440,494,554,659,740];
  function bubbleNote() {
    if (!audioCtx || musicMuted) { setTimeout(bubbleNote, 2000 + Math.random()*3000); return; }
    const t = audioCtx.currentTime + 0.05;
    const freq = penta[Math.floor(Math.random()*penta.length)];
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.035,t+0.06); g.gain.exponentialRampToValueAtTime(0.001,t+1.8);
    osc.connect(g); g.connect(convolver); g.connect(master);
    osc.start(t); osc.stop(t+2);
    setTimeout(bubbleNote, 1500 + Math.random()*3500);
  }
  bubbleNote();

  // Whale sweeps
  function whaleSweep() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime + 0.1;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const base = 50 + Math.random()*40;
    osc.type = 'sine'; osc.frequency.setValueAtTime(base, t);
    osc.frequency.linearRampToValueAtTime(base*1.6, t+5);
    osc.frequency.linearRampToValueAtTime(base*0.75, t+10);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.07,t+2); g.gain.linearRampToValueAtTime(0,t+10);
    osc.connect(g); g.connect(convolver);
    osc.start(t); osc.stop(t+11);
    setTimeout(whaleSweep, 9000 + Math.random()*14000);
  }
  whaleSweep();
}

function playChomp() {
  // Soft rising "bloop" â€” sine sweep, oceanic bubble feel
  if (!audioCtx || musicMuted) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(220, t);
  osc.frequency.exponentialRampToValueAtTime(500, t + 0.07);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.16, t + 0.007);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.30);
  // Warm harmonic shimmer
  const h  = audioCtx.createOscillator();
  const hg = audioCtx.createGain();
  h.type = 'triangle';
  h.frequency.setValueAtTime(440, t + 0.05);
  hg.gain.setValueAtTime(0.06, t + 0.05);
  hg.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
  h.connect(hg); hg.connect(audioCtx.destination);
  h.start(t + 0.05); h.stop(t + 0.24);
}

function playSmallChomp() {
  // Light happy pop for eating smaller prey — bright & cheerful
  if (!audioCtx || musicMuted) return;
  const t = audioCtx.currentTime;
  // Rising two-tone ping: feels like a reward jingle
  const notes = [523, 659]; // C5, E5 — happy major third
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t + i * 0.055);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.05, t + i * 0.055 + 0.07);
    g.gain.setValueAtTime(0, t + i * 0.055);
    g.gain.linearRampToValueAtTime(0.09, t + i * 0.055 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.055 + 0.18);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t + i * 0.055); osc.stop(t + i * 0.055 + 0.2);
  });
  // Tiny sparkle shimmer on top
  const shimmer = audioCtx.createOscillator();
  const sg = audioCtx.createGain();
  shimmer.type = 'triangle';
  shimmer.frequency.setValueAtTime(1047, t + 0.09); // C6
  sg.gain.setValueAtTime(0.04, t + 0.09);
  sg.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
  shimmer.connect(sg); sg.connect(audioCtx.destination);
  shimmer.start(t + 0.09); shimmer.stop(t + 0.3);
}

function playEvolveSound() {
  // Gentle 3-note chime: C5 â†’ E5 â†’ G5 â€” airy triangle, short and sweet
  if (!audioCtx || musicMuted) return;
  const t = audioCtx.currentTime;
  [[523, 0], [659, 0.10], [784, 0.20]].forEach(([freq, delay]) => {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, t + delay);
    g.gain.setValueAtTime(0, t + delay);
    g.gain.linearRampToValueAtTime(0.09, t + delay + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.45);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t + delay); osc.stop(t + delay + 0.48);
  });
}

function playDeathSound() {
  if (!audioCtx) return;
  audioCtx.resume();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(180, t);
  osc.frequency.exponentialRampToValueAtTime(55, t + 0.6);
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
  osc.connect(g); g.connect(audioCtx.destination);

const MAX_CREATURES = 66; // +10% density

function spawnCreature() {
  // Window: 5 tiers below, 10 tiers above player
  const pTier = (typeof player !== 'undefined') ? player.tierIdx : 0;
  const minT  = Math.max(0,     pTier - 5);
  const maxT  = Math.min(N - 1, pTier + 10);

  // Three buckets with fixed spawn probabilities:
  //   20% — below player (easy prey, small count)
  //   10% — same tier   (upgrade targets, rare so screen isn't flooded)
  //   70% — above player (threats & variety, spread across up to 10 tiers)
  const hasPrey   = pTier > minT;
  const hasAbove  = pTier < maxT;
  const roll = Math.random();
  let tierIdx;

  if (roll < 0.05 && hasPrey) {
    // Prey: uniform across tiers below player
    tierIdx = minT + Math.floor(Math.random() * (pTier - minT));
  } else if (roll < 0.20) {
    // Same tier (upgrade) — only 10%
    tierIdx = pTier;
  } else {
    // Threat: uniform across tiers strictly above player
    if (hasAbove) {
      tierIdx = (pTier + 1) + Math.floor(Math.random() * (maxT - pTier));
    } else {
      // Edge case: at max tier, fall back to same or below
      tierIdx = pTier;
    }
  }
  tierIdx = Math.max(minT, Math.min(maxT, tierIdx));
  const t = TIERS[tierIdx];
  const edge = Math.floor(Math.random()*4);
  const pad = t.r * 3;
  let x, y;
  if      (edge===0) { x = -pad;              y = Math.random()*canvas.height; }
  else if (edge===1) { x = canvas.width+pad;  y = Math.random()*canvas.height; }
  else if (edge===2) { x = Math.random()*canvas.width; y = -pad; }
  else               { x = Math.random()*canvas.width; y = canvas.height+pad; }
  const angle = Math.random()*Math.PI*2;
  // Bigger = slower, tiny = zippy
  const speed = Math.max(0.22, 1.35 - tierIdx * 0.023) * (0.6 + Math.random()*0.8); // 25% slower
  return {
    x, y, tierIdx, angle,
    vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
    wobble: Math.random()*Math.PI*2,
    driftAngle: angle,  // graceful wandering direction
  };
}

function formatTime(secs) {

function setHUDTierIcon(el, tierIdx) {
  if (el._hudTier === tierIdx && el.querySelector('img')) return;
  const safeIdx = Math.min(tierIdx, SPRITE_CP.length - 1);
  const isSvg   = !!SPRITE_URL[safeIdx];
  let src = null;
  if (isSvg) {
    const img = emojiCache['svg_' + safeIdx];
    if (img && img.src) src = img.src;
  } else {
    const tc = tintedSpriteCache[tierIdx];
    if (tc) src = tc.toDataURL();
  }
  if (src) {
    el.innerHTML = '<img src="' + src + '" style="width:16px;height:16px;vertical-align:middle;">';
    el._hudTier = tierIdx;
  } else {
    el.textContent = SPRITE_EMOJI[safeIdx] || TIERS[tierIdx].e;
  }
}

  const t = TIERS[ti];
  scoreEl.textContent = Math.floor(score);
  timerEl.textContent = formatTime(gameTimer);
  curNameEl.textContent = t.name;
  const nxt = TIERS[ti+1];
  nextNameEl.textContent  = nxt ? nxt.name : 'MAX';
  setHUDTierIcon(tierDisplayEl, ti);
  if (nxt) setHUDTierIcon(nextEmojiEl, ti + 1);
  else nextEmojiEl.textContent = '👑';

// ─── EMOJI RENDERER — Twemoji PNG (the permanent fix) ───────────────────────
// Loads each emoji as a real PNG image from Twitter's Twemoji CDN via jsDelivr.
// This works in every browser, every OS, file://, sandboxed iframes — everywhere.
// No canvas font stack, no SVG foreignObject, no fillText. Just Image() + drawImage().
//
// HOW TO ADD NEW EMOJI SPRITES:
//   1. Go to emojipedia.org, find the emoji
//   2. Get its hex codepoint (e.g. U+1F990 → '1f990')  
//   3. Add emoji to SPRITE_EMOJI and codepoint to SPRITE_CP at same index
//   4. Done. Twemoji CDN has every emoji up to Unicode 14.

const TWEMOJI_CDN = 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/';
const emojiCache = {}; // key: codepoint string → HTMLImageElement (or canvas fallback)
const emojiReady = {}; // key: codepoint string → boolean

const tintedSpriteCache = {}; // tierIdx → pre-baked tinted canvas

function buildTintedSprite(baseImg, tintColor, alpha) {
  const SIZE = 144;
  const oc = document.createElement('canvas');
  oc.width = SIZE; oc.height = SIZE;
  const ox = oc.getContext('2d');
  ox.drawImage(baseImg, 0, 0, SIZE, SIZE);
  ox.globalCompositeOperation = 'source-atop';
  ox.globalAlpha = alpha;
  ox.fillStyle = tintColor;
  ox.fillRect(0, 0, SIZE, SIZE);
  return oc;
}

function getTintedImg(tierIdx, baseImg) {
  if (tintedSpriteCache[tierIdx] !== undefined) return tintedSpriteCache[tierIdx];
  const tint = SPRITE_TINT[Math.min(tierIdx, SPRITE_TINT.length - 1)];
  if (!tint) { tintedSpriteCache[tierIdx] = null; return null; }
  tintedSpriteCache[tierIdx] = buildTintedSprite(baseImg, tint, 0.70);
  return tintedSpriteCache[tierIdx];
}

function getEmojiImg(tierIdx) {
  const safeIdx   = Math.min(tierIdx, SPRITE_CP.length - 1);
  const customUrl = SPRITE_URL[safeIdx];

  if (customUrl) {
    const key = 'svg_' + safeIdx;
    if (emojiCache[key]) return emojiCache[key];  // already loaded
    if (key in emojiReady) return null;            // fetch in progress
    emojiReady[key] = false;
    fetch(customUrl)
      .then(r => r.text())
      .then(svg => {
        // Replace currentColor so the icon renders white â€” visible on the dark ocean.
        // Use the tier's SPRITE_TINT color directly as the SVG fill (baked in at fetch time).
        const svgTint = SPRITE_TINT[safeIdx] || '#ffffff';
        const colored = svg.replace(/currentColor/g, svgTint);
        const blob    = new Blob([colored], { type: 'image/svg+xml' });
        const blobUrl = URL.createObjectURL(blob);
        const img     = new Image();
        img.onload  = () => { emojiCache[key] = img; emojiReady[key] = true; URL.revokeObjectURL(blobUrl); };
        img.onerror = () => { emojiReady[key] = true; }; // shows placeholder until next retry
        img.src = blobUrl;
      })
      .catch(() => { emojiReady[key] = true; });
    return null;
  }

  // Look up by tier index, not by emoji character â€” avoids encoding issues
  const cp = SPRITE_CP[safeIdx];
  if (emojiCache[cp]) return emojiCache[cp];

  // Create image and start loading â€” returns immediately
  const img = new Image();
  img.crossOrigin = 'anonymous';
  emojiCache[cp] = img;
  emojiReady[cp] = false;

  img.onload  = () => { emojiReady[cp] = true; };
  img.onerror = () => {
    // CDN failed â€” draw emoji text onto a canvas as last-resort fallback
    const s = 144;
    const fb = document.createElement('canvas');
    fb.width = s; fb.height = s;
    const fc = fb.getContext('2d');
    fc.font = '110px serif';
    fc.textAlign = 'center';
    fc.textBaseline = 'middle';
    fc.fillText(SPRITE_EMOJI[Math.min(tierIdx, SPRITE_EMOJI.length-1)], s/2, s/2);
    emojiCache[cp] = fb;
    emojiReady[cp] = true;
  };

  img.src = TWEMOJI_CDN + cp + '.png';
  return img;
}

// Pre-load all 40 tier images at startup so they're ready before gameplay
function prewarmEmojiCache() {
  for (let i = 0; i < SPRITE_CP.length; i++) getEmojiImg(i);
}

function drawCreature(x, y, tierIdx, angle, wobble, isPlayer, flashTimer, npcGlowCol, npcGlowBlur) {
  const t = TIERS[tierIdx];
  const r = t.r;
  const fish = isFishTier(tierIdx);

  // ── PLAYER ────────────────────────────────────────────────────────────────
  if (isPlayer) {
    ctx.save();
    ctx.translate(x, y);
    if (smoothMouse.x < x) ctx.scale(-1, 1);
    ctx.shadowBlur = 0;
    drawSeahorse(r * 0.95, tierIdx / (N - 1));
    ctx.restore();
    return;
  }

  // ── NPC ───────────────────────────────────────────────────────────────────
  const bob       = fish ? Math.sin(wobble * 0.6) * r * 0.08 : 0;
  const leanAngle = fish ? Math.sin(wobble * 0.4) * 0.03
                         : angle + Math.sin(wobble * 0.8) * 0.05;
  const movingLeft = Math.cos(angle) < 0;

  const safeIdx    = Math.min(tierIdx, SPRITE_CP.length - 1);
  const cp         = SPRITE_CP[safeIdx];
  const img        = getEmojiImg(tierIdx);
  const cacheKey   = (SPRITE_URL[safeIdx]) ? 'svg_' + safeIdx : cp;
  const ready      = emojiReady[cacheKey];
  const spriteSize = r * 2.2;
  const tint       = SPRITE_TINT[safeIdx];
  // SVG tiers have tint baked into source; Twemoji tiers use pre-baked tinted canvas
  const isSvg      = !!SPRITE_URL[safeIdx];
  const displayImg = (!isSvg && img && tint) ? (getTintedImg(safeIdx, img) || img) : img;

  ctx.save();
  ctx.translate(x, y + bob);
  ctx.rotate(leanAngle);
  if (movingLeft) ctx.scale(-1, 1);

  if (ready) {
    // ── GLOW PASS: ctx.shadowBlur on drawImage works perfectly for PNG ──────
    // The shadow spreads around the transparent PNG silhouette giving a clean
    // colored outline/halo. This is reliable across all browsers for images.
    if (npcGlowCol) {
      // Neon glow: three passes at increasing blur = vivid coloured halo
      // Pass 1 — wide outer bloom
      ctx.save();
      ctx.shadowColor = npcGlowCol;
      ctx.shadowBlur  = (npcGlowBlur || 14) * 5;
      ctx.globalAlpha = 0.55;
      ctx.drawImage(displayImg, -spriteSize / 2, -spriteSize / 2, spriteSize, spriteSize);
      ctx.restore();
      // Pass 2 — tight bright core ring
      ctx.save();
      ctx.shadowColor = npcGlowCol;
      ctx.shadowBlur  = (npcGlowBlur || 14) * 2;
      ctx.globalAlpha = 1.0;
      ctx.drawImage(displayImg, -spriteSize / 2, -spriteSize / 2, spriteSize, spriteSize);
      ctx.restore();
    }

    // ── CLEAN PASS: draw crisp sprite with no shadow ─────────────────────────
    ctx.shadowBlur  = 0;
    ctx.shadowColor = 'transparent';
    ctx.drawImage(displayImg, -spriteSize / 2, -spriteSize / 2, spriteSize, spriteSize);

    // ── TINT PASS: color overlay for same-sprite tier differentiation ────────


  } else {
    // Still loading — draw colored placeholder so creature is never invisible
    ctx.beginPath();
    ctx.arc(0, 0, spriteSize * 0.40, 0, Math.PI * 2);
    ctx.fillStyle = npcGlowCol || t.col || '#88ccff';
    ctx.globalAlpha = 0.6;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(0, 0, spriteSize * 0.40, 0, Math.PI * 2);
    ctx.strokeStyle = npcGlowCol || '#fff';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  ctx.restore();
}

function drawSeahorse(r, fatness) {
  // Fisherman sprite — grows with tier, no eye overlay
  const scale = 1.0 + fatness * 0.55; // grows 55% from tier 0 → tier 49

}

// ─── PARTICLES / FIREWORKS ───────────────────────────────────────────────────
let particles = [];

function spawnFireworks(x, y) {
  const colors = ['#ff4466','#ffdd00','#44ffcc','#ff88ff','#44aaff','#ffffff','#ffaa22'];
  // Burst of 60 sparks
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      col: colors[Math.floor(Math.random() * colors.length)],
      life: 1.0,
      decay: 0.012 + Math.random() * 0.018,
      r: 2 + Math.random() * 3,
      trail: [],
    });
  }
  // Secondary ring burst
  for (let i = 0; i < 20; i++) {
    const angle = (i / 20) * Math.PI * 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * (3.5 + Math.random()),
      vy: Math.sin(angle) * (3.5 + Math.random()),
      col: '#ffffff',
      life: 0.8,
      decay: 0.02,
      r: 1.5,
      trail: [],
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 5) p.trail.shift();
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.08 * dt; // gravity
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= p.decay * dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    // Draw trail
    for (let j = 0; j < p.trail.length - 1; j++) {
      const alpha = (j / p.trail.length) * p.life * 0.5;
      ctx.beginPath();
      ctx.moveTo(p.trail[j].x, p.trail[j].y);
      ctx.lineTo(p.trail[j+1].x, p.trail[j+1].y);
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = p.col;
      ctx.lineWidth = p.r * 0.5;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
    // Draw spark / glitter
    ctx.globalAlpha = p.life * 0.9;
    if (false) { // glitter removed
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.col;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// Game over / celebration state
let gameOver = false;
let gameOverTimer = 0;
let celebrationActive = false;

// ─── CELEBRATION & GAME OVER ─────────────────────────────────────────────────
function triggerCelebration(x, y) {
  celebrationActive = true;
  playEvolveSound();
  // Flash the evolution message
  const el = document.getElementById('evolution-msg');
  const ti = player.tierIdx;
  el.textContent = (SPRITE_EMOJI[ti] || TIERS[ti].e) + ' ' + TIERS[ti].name + '!';
  el.style.opacity = 1;
  el.classList.remove('celebrate');
  void el.offsetWidth;
  el.classList.add('celebrate');
  setTimeout(() => { el.style.opacity = 0; el.classList.remove('celebrate'); }, 2400);
}

function triggerGameOver() {
  gameRunning = false;
  gameOver = true;
  const finalTier = TIERS[player.tierIdx];
  const finalScore = calcFinalScore();
  document.getElementById('go-score').textContent = finalScore.toLocaleString();
  document.getElementById('go-raw-score').textContent = Math.floor(score).toLocaleString();
  document.getElementById('go-time').textContent = formatTime(gameTimer);
  document.getElementById('go-creature').textContent = '🎣';
  document.getElementById('go-tier-name').textContent = finalTier.name;
  if (finalScore > bestScore) {
    bestScore = finalScore;
    localStorage.setItem('oceanBestFinal', bestScore);
  }
  const isBest = finalScore >= bestScore;
  document.getElementById('go-best').textContent = isBest ? '🏆 New Best!' : `Best: ${bestScore.toLocaleString()}`;
  const goScreen = document.getElementById('gameover-screen');
  goScreen.style.display = 'flex';

  // Fireworks celebration centered on the score panel
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const bursts = 12;
  for (let b = 0; b < bursts; b++) {
    setTimeout(() => {
      // Spread bursts around the center score area
      const angle = (b / bursts) * Math.PI * 2;
      const dist = 80 + Math.random() * 160;
      const bx = cx + Math.cos(angle) * dist + (Math.random()-0.5)*60;
      const by = cy + Math.sin(angle) * dist * 0.55 + (Math.random()-0.5)*40;
      spawnFireworks(bx, by);
    }, b * 200);
  }
  // Extra central burst on score reveal
  setTimeout(() => spawnFireworks(cx, cy - 30), 100);
  setTimeout(() => spawnFireworks(cx, cy - 30), 800);

  requestAnimationFrame(deathLoop);
}

function deathLoop(ts) {
  drawBackground();
  // Draw remaining creatures (frozen)
  creatures.forEach(cr => {
    const dg = cr.tierIdx > player.tierIdx ? '#ff4444' : '#00ff88';
    drawCreature(cr.x, cr.y, cr.tierIdx, cr.angle, cr.wobble, false, 0, dg, 10);
  });
  updateParticles(1.2);
  if (gameOver) requestAnimationFrame(deathLoop);
}

function restartGame() {
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('win-screen').style.display = 'none';
  particles = [];
  floatScores.length = 0;
  gameOver = false;
  gameWon = false;
  gameTimer = 0;
  gameTimerRaw = 0;
  player = initPlayer();
  creatures = Array.from({length: MAX_CREATURES}, spawnCreature);
  score = 0;
  lastEvolveIdx = -1;
  celebrationActive = false;
  gameRunning = true;
  prewarmEmojiCache(); // ensure cache is warm (instant if already loaded)
  updateUI();
  requestAnimationFrame(loop);
}

// ─── FLOAT SCORE POPUPS ──────────────────────────────────────────────────────
const floatScores = [];
function showFloatScore(text, x, y, col) {
  floatScores.push({ text, x, y, col: col || '#fff', life: 1.0, vy: -1.8 });
}
function drawFloatScores(dt) {
  for (let i = floatScores.length - 1; i >= 0; i--) {
    const f = floatScores[i];
    f.life -= 0.022 * dt;
    f.y += f.vy * dt;
    f.vy *= 0.97;
    if (f.life <= 0) { floatScores.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = Math.min(1, f.life * 2);
    ctx.font = `bold ${Math.round(14 + (1 - f.life) * 4)}px 'Cinzel', serif`;
    ctx.fillStyle = f.col;
    ctx.shadowColor = f.col;
    ctx.shadowBlur = 8;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  }
}

// ─── GAME LOOP ───────────────────────────────────────────────────────────────
let lastTime = 0;

function loop(ts = 0) {
  if (!gameRunning || gameWon || gamePaused) return;
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  // Smooth mouse — gentle lerp removes micro-jitter while staying responsive
  smoothMouse.x += (rawMouse.x - smoothMouse.x) * Math.min(1, 0.10 * dt * 3);
  smoothMouse.y += (rawMouse.y - smoothMouse.y) * Math.min(1, 0.10 * dt * 3);

  // Timer — count elapsed seconds
  gameTimerRaw += dt * 16.67; // convert dt frames → ms
  gameTimer = gameTimerRaw / 1000;

  // ── Background ──
  drawBackground();

  // Caustic rays
  for (let i=0;i<5;i++) {
    const rx = (canvas.width*(i+0.5)/5) + Math.sin(ts/3000+i)*40;
    const rg = ctx.createLinearGradient(rx,0,rx+30,canvas.height*0.7);
    rg.addColorStop(0,'rgba(0,180,255,0.04)'); rg.addColorStop(1,'rgba(0,180,255,0)');
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.moveTo(rx-20,0); ctx.lineTo(rx+50,0);
    ctx.lineTo(rx+80,canvas.height*0.7); ctx.lineTo(rx+10,canvas.height*0.7); ctx.fill();
  }

  // Bubbles
  bubbles.forEach(b => {
    b.y -= b.speed*dt; b.x += Math.sin(ts/2000+b.y*0.01)*0.25;
    if (b.y < -10) { b.y = canvas.height+10; b.x = Math.random()*canvas.width; }
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(100,200,255,${b.opacity})`; ctx.lineWidth = 0.5; ctx.stroke();
  });

  // ── Player movement — smooth glide directly toward cursor ──
  const dx = smoothMouse.x - player.x;
  const dy = smoothMouse.y - player.y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  // Glide factor: how quickly the player closes the gap each frame
  // Higher = more responsive, lower = floatier. 0.08–0.12 feels natural.
  const glide = Math.min(1, 0.09 * dt * 3);
  player.x += dx * glide;
  player.y += dy * glide;

  // Track velocity for collision ring/glow (vx/vy still needed by NPC trail code)
  player.vx = dx * glide / Math.max(dt, 0.5);
  player.vy = dy * glide / Math.max(dt, 0.5);

  // Facing angle — smooth, follows movement direction
  if (dist > 4) {
    const targetAngle = Math.atan2(dy, dx);
    let ad = targetAngle - player.angle;
    while (ad >  Math.PI) ad -= Math.PI * 2;
    while (ad < -Math.PI) ad += Math.PI * 2;
    player.angle += ad * Math.min(1, 0.08 * dt * 3);
  }

  player.x = Math.max(0, Math.min(canvas.width,  player.x));
  player.y = Math.max(0, Math.min(canvas.height, player.y));

  // ── Creatures ──
  // Cull: 5 below, 10 above (matches spawn window)
  const pMin = Math.max(0, player.tierIdx - 5);
  const pMax = Math.min(N - 1, player.tierIdx + 10);
  for (let ci = creatures.length - 1; ci >= 0; ci--) {
    if (creatures[ci].tierIdx < pMin || creatures[ci].tierIdx > pMax) {
      creatures.splice(ci, 1);
    }
  }
  while (creatures.length < MAX_CREATURES) creatures.push(spawnCreature());

  for (let i = creatures.length-1; i >= 0; i--) {
    const c = creatures[i];
    // Slow wobble tick for animation only
    c.wobble += 0.025 * dt;

    // Graceful wandering: steer toward a slowly-drifting target direction
    // Each creature has a preferred drift angle that changes very gently
    if (c.driftAngle === undefined) c.driftAngle = c.angle;
    c.driftAngle += (Math.random() - 0.5) * 0.012 * dt;  // tiny, slow drift
    // Gently nudge velocity toward drift direction — much smoother than random jitter
    const maxSpd = Math.max(0.15, 0.9 - c.tierIdx * 0.015); // 25% slower
    c.vx += (Math.cos(c.driftAngle) * maxSpd - c.vx) * 0.008 * dt;
    c.vy += (Math.sin(c.driftAngle) * maxSpd - c.vy) * 0.008 * dt;
    c.x += c.vx*dt; c.y += c.vy*dt;
    // Update facing angle smoothly (for non-fish), or just vx sign (for fish)
    const targetAngle = Math.atan2(c.vy, c.vx);
    let ca = targetAngle - c.angle;
    while (ca > Math.PI) ca -= Math.PI*2;
    while (ca < -Math.PI) ca += Math.PI*2;
    c.angle += ca * 0.04 * dt;

    if (c.x < -300 || c.x > canvas.width+300 || c.y < -300 || c.y > canvas.height+300) {
      creatures.splice(i,1); continue;
    }

    // Collision
    const cdx = player.x - c.x, cdy = player.y - c.y;
    const cdist = Math.sqrt(cdx*cdx + cdy*cdy);
    const pr = TIERS[player.tierIdx].r * 0.95;
    const cr = TIERS[c.tierIdx].r;
    // Bigger relative hitbox at low tiers for easier early collision
    const hitboxScale = 0.62 - Math.min(0.12, player.tierIdx * 0.004);
    const hitDist = (pr + cr) * hitboxScale;

    if (cdist < hitDist) {
      if (c.tierIdx === player.tierIdx) {
        // Equal — eat & evolve immediately
        const evolveBonus = 100 + player.tierIdx * 10;
        score += evolveBonus;
        showFloatScore('+' + evolveBonus + ' EVOLVE!', c.x, c.y, '#ffffff');
        playChomp();
        const next = player.tierIdx + 1;
        if (next < N) {
          player.tierIdx = next;
          if (player.tierIdx === N - 1) {
            // One more eat at max tier = EXPLODE
            setTimeout(() => triggerWin(), 600);
          } else {
            triggerCelebration(player.x, player.y);
          }
        } else {
          // Already at max — next eat wins
          triggerWin();
        }
        player._flashTimer = 22;
        creatures.splice(i,1); continue;
      } else if (c.tierIdx < player.tierIdx) {
        // Smaller — score only, no evolution
        const pts = 10 + c.tierIdx * 3;
        score += pts;
        playSmallChomp();
        showFloatScore('+' + pts, c.x, c.y, '#00ff88');
        creatures.splice(i,1); continue;
      } else {
        // LARGER — game over
        playDeathSound();
        triggerGameOver();
        creatures.splice(i,1); continue;
      }
    }

    // ── Threat classification — colored glow outlines ────────────────────────
    let glowCol, glowBlur;
    const tierDiff = c.tierIdx - player.tierIdx;
    if (tierDiff === 0) {
      glowCol = '#00ff88'; glowBlur = 8;  // green = same tier (eatable)
    } else if (tierDiff > 0) {
      // Danger: brighter glow the closer in tier (nearby threats are more vivid)
      const danger = Math.min(1, tierDiff / 5);
      glowBlur = 10 + danger * 8;
      glowCol = '#ff4444';
    } else {
      // Prey: softer green
      glowBlur = 8;
      glowCol = '#00ff88';
    }

    // Draw NPC with glow tracing sprite outline
    drawCreature(c.x, c.y, c.tierIdx, c.angle, c.wobble, false, 0, glowCol, glowBlur);
  }

  // Draw particles / fireworks
  updateParticles(dt);
  drawFloatScores(dt);

  // Draw player
  if (player._flashTimer > 0) player._flashTimer--;
  drawCreature(player.x, player.y, player.tierIdx, player.angle, 0, true, player._flashTimer);

  updateUI();
  // Live best — shows current finalScore if it's a new record
  const liveFinal = calcFinalScore();
  if (liveFinal > bestScore) {
    bestScore = liveFinal;
    localStorage.setItem('oceanBestFinal', bestScore);
    bestEl.textContent = bestScore.toLocaleString();
  }
  requestAnimationFrame(loop);
}
</script>
